version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: aps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aps_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aps_password}
      POSTGRES_DB: ${POSTGRES_DB:-ai_product_studio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aps_user} -d ${POSTGRES_DB:-ai_product_studio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: aps-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: aps-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aps-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./deliverables:/app/deliverables
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://aps_user:aps_password@db:5432/ai_product_studio}
      - REDIS_URL=${REDIS_URL:-redis://:redis_password@redis:6379/0}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct-v0.2-q4_K_M}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - DELIVERY_SECRET=${DELIVERY_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aps-worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./deliverables:/app/deliverables
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://aps_user:aps_password@db:5432/ai_product_studio}
      - REDIS_URL=${REDIS_URL:-redis://:redis_password@redis:6379/0}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct-v0.2-q4_K_M}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - DELIVERY_SECRET=${DELIVERY_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      sh -c "celery -A app.workers.celery_app worker -l info -Q research,plan,generate,promote,sales --concurrency=2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aps-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  ollama_models:
